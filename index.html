<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Human Heart AR</title>

<script type="module"
src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

<style>
body{
    margin:0;
    background:#f2f2f2;
    font-family:Arial;
    text-align:center;
}

h1{
    color:#c62828;
}

model-viewer{
    width:100%;
    height:80vh;
    background:white;
}

p{
    font-size:18px;
}
</style>

</head>
<body>

<h1>🫀 Human Heart in AR</h1>

<model-viewer
src="heart.glb"
ios-src="heart.usdz"

camera-controls
auto-rotate

ar
ar-modes="scene-viewer webxr quick-look"

shadow-intensity="1"

alt="Human Heart">

<button slot="ar-button"
style="padding:15px 30px;
font-size:20px;
background:#d32f2f;
color:white;
border:none;
border-radius:10px;">
View in AR
</button>

</model-viewer>

<p>Rotate the heart or tap <b>View in AR</b> to place it in your room.</p>

</body>
</html>
